<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Figura 3D - Cuerpo de revolución con campo vectorial</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            font-size: 14px;
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>📐 Figura de revolución</strong> | Eje Z: 0 a 15 cm | Campo vectorial 3D
    </div>
    <div id="controls-note">
        🖱️ Ratón: rotar (izq), mover (der), zoom (rueda) | 📱 Táctil: gestos
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Construcción de la figura por revolución (LatheGeometry) ---
        // Perfil: radio en función de la altura Z (de 0 a 15 cm)
        // Ajustado según el gráfico: en Z=0 radio ~2 cm, luego decrece hasta Z=15 radio ~0
        const points = [];
        for (let z = 0; z <= 15.1; z += 0.15) {
            let r;
            if (z < 1.5) r = 2.0;
            else if (z < 3.5) r = 2.0 - (z - 1.5) * 0.3;
            else if (z < 6) r = 1.4 - (z - 3.5) * 0.2;
            else if (z < 9) r = 0.9 - (z - 6) * 0.15;
            else if (z < 12) r = 0.45 - (z - 9) * 0.1;
            else r = 0.15 - (z - 12) * 0.05;
            if (r < 0) r = 0;
            points.push(new THREE.Vector2(r, z));
        }
        
        const geometry = new THREE.LatheGeometry(points, 64);
        const material = new THREE.MeshStandardMaterial({
            color: 0xcc8844,
            metalness: 0.75,
            roughness: 0.3,
            emissive: 0x331100,
            emissiveIntensity: 0.2
        });
        
        const figure = new THREE.Mesh(geometry, material);
        figure.castShadow = true;
        figure.receiveShadow = false;
        // Rotar para que el eje de revolución (Y) pase a ser Z
        figure.rotation.x = -Math.PI / 2;
        // Centrar la figura en el origen (su base está en Z=0, punta en Z=15)
        figure.position.z = -7.5; // para que quede centrada entre -7.5 y 7.5
        
        // --- Escena ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 5, 8);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // Controles
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.target.set(0, 0, 0);
        
        // Iluminación
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const backLight = new THREE.PointLight(0x4466cc, 0.5);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xccaa66, 0.4);
        fillLight.position.set(0, -1, 0);
        scene.add(fillLight);
        const rimLight = new THREE.PointLight(0xffaa66, 0.6);
        rimLight.position.set(1, 2, 2);
        scene.add(rimLight);
        
        // Suelo (grilla)
        const gridHelper = new THREE.GridHelper(12, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -3;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.4;
        scene.add(gridHelper);
        
        scene.add(figure);
        
        // --- Campo vectorial (flechas) ---
        function vectorField(x, y, z) {
            let vx = -z * 0.5;
            let vy = Math.sin(x * 1.2) * Math.cos(z * 1.2) * 0.5;
            let vz = x * 0.5;
            let len = Math.hypot(vx, vy, vz);
            if (len < 0.05) return new THREE.Vector3(0, 0.2, 0);
            const scale = 0.45;
            return new THREE.Vector3(vx / len * scale, vy / len * scale, vz / len * scale);
        }
        
        const step = 1.0;
        const arrowGroup = new THREE.Group();
        for (let x = -3.5; x <= 3.5; x += step) {
            for (let y = -3.5; y <= 3.5; y += step) {
                for (let z = -6; z <= 7; z += step) {
                    const dist = Math.hypot(x, y, z);
                    if (dist > 2.0 && dist < 4.5) {
                        const dir = vectorField(x, y, z);
                        const hue = 0.55 + (dir.x * 0.2);
                        const color = new THREE.Color().setHSL(hue, 1.0, 0.6);
                        const arrow = new THREE.ArrowHelper(dir, new THREE.Vector3(x, y, z), dir.length(), color, 0.28, 0.12);
                        arrowGroup.add(arrow);
                    }
                }
            }
        }
        scene.add(arrowGroup);
        
        // Partículas dinámicas alrededor
        const flowCount = 1500;
        const flowGeo = new THREE.BufferGeometry();
        const flowPositions = new Float32Array(flowCount * 3);
        for (let i = 0; i < flowCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.5 + Math.random() * 1.8;
            const z = -5 + Math.random() * 12;
            flowPositions[i*3] = Math.cos(angle) * radius;
            flowPositions[i*3+1] = Math.sin(angle) * radius;
            flowPositions[i*3+2] = z;
        }
        flowGeo.setAttribute('position', new THREE.BufferAttribute(flowPositions, 3));
        const flowMat = new THREE.PointsMaterial({ color: 0x88ddff, size: 0.055, transparent: true, blending: THREE.AdditiveBlending });
        const flowParticles = new THREE.Points(flowGeo, flowMat);
        scene.add(flowParticles);
        
        function updateFlow(deltaTime) {
            const positions = flowGeo.attributes.position.array;
            const speed = deltaTime * 2.2;
            for (let i = 0; i < flowCount; i++) {
                let px = positions[i*3];
                let py = positions[i*3+1];
                let pz = positions[i*3+2];
                const dir = vectorField(px, py, pz);
                px += dir.x * speed;
                py += dir.y * speed;
                pz += dir.z * speed;
                if (Math.hypot(px, py) > 4.2 || pz < -7 || pz > 8) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 2.5 + Math.random() * 1.8;
                    px = Math.cos(angle) * radius;
                    py = Math.sin(angle) * radius;
                    pz = -5 + Math.random() * 12;
                }
                positions[i*3] = px;
                positions[i*3+1] = py;
                positions[i*3+2] = pz;
            }
            flowGeo.attributes.position.needsUpdate = true;
        }
        
        // Etiqueta CSS
        const labelDiv = document.createElement('div');
        labelDiv.textContent = `📐 Cuerpo de revolución | Altura 15 cm | Base Ø4 cm`;
        labelDiv.style.color = '#ffdd99';
        labelDiv.style.backgroundColor = 'rgba(0,0,0,0.6)';
        labelDiv.style.padding = '5px 12px';
        labelDiv.style.borderRadius = '20px';
        labelDiv.style.fontSize = '14px';
        const labelObj = new CSS2DObject(labelDiv);
        labelObj.position.set(3, 2.5, 4);
        scene.add(labelObj);
        
        // Animación
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            rimLight.intensity = 0.6 + Math.sin(Date.now() * 0.003) * 0.2;
            updateFlow(delta);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Figura de revolución cargada correctamente');
    </script>
</body>
</html>
