<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alfil AR con Campo Vectorial</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #mensaje {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: lime;
            padding: 8px 15px;
            border-radius: 8px;
            z-index: 100;
            pointer-events: none;
            font-size: 14px;
        }
        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: red;
            color: white;
            padding: 20px;
            border-radius: 10px;
            z-index: 200;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="mensaje">🎯 Apunta al marcador HIRO impreso</div>
    <div id="error">❌ Error: No se pudo acceder a la cámara o cargar AR.js.<br>Asegúrate de dar permiso y usar HTTPS.</div>

    <!-- Cargar librerías con script tradicional (no módulos) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/three.js/ar-threex.min.js"></script>

    <script>
        (function() {
            // Verificar si las librerías cargaron
            if (typeof THREE === 'undefined' || typeof THREEx === 'undefined') {
                document.getElementById('error').style.display = 'block';
                return;
            }

            // --- Configuración AR.js ---
            let renderer, scene, camera, arToolkitSource, arToolkitContext, markerRoot;

            // Inicializar renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0); // transparente para ver la cámara
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Escena y cámara
            scene = new THREE.Scene();
            camera = new THREE.Camera(); // AR.js reemplazará la matriz de la cámara

            // Fuente de vídeo (webcam)
            arToolkitSource = new THREEx.ArToolkitSource({
                sourceType: 'webcam',
                sourceWidth: 640,
                sourceHeight: 480,
                displayWidth: window.innerWidth,
                displayHeight: window.innerHeight
            });

            arToolkitSource.init(function onReady() {
                // Una vez lista la cámara, iniciamos el contexto de tracking
                arToolkitContext = new THREEx.ArToolkitContext({
                    cameraParametersUrl: 'https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/data/camera_para.dat',
                    detectionMode: 'mono',
                    maxDetectionRate: 30,
                    canvasWidth: 640,
                    canvasHeight: 480
                });

                arToolkitContext.init(function onContextReady() {
                    // Configurar la proyección de la cámara
                    camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
                });

                // Cada frame, actualizar el contexto y el renderizado
                requestAnimationFrame(function animate() {
                    if (arToolkitSource.ready === false) return;
                    if (arToolkitContext.ready === false) return;

                    // Actualizar source y contexto
                    arToolkitSource.update();
                    arToolkitContext.update(arToolkitSource.domElement);

                    // Actualizar matriz de la cámara
                    camera.matrixWorld.copy(arToolkitContext.getCameraMatrix());
                    camera.matrixWorldInverse.copy(camera.matrixWorld).invert();

                    // Renderizar
                    renderer.render(scene, camera);
                    requestAnimationFrame(animate);
                });
            });

            // --- CREAR MARCADOR HIRO y añadir el grupo del alfil ---
            markerRoot = new THREE.Group();
            scene.add(markerRoot);

            // Controlador del marcador
            const markerControls = new THREEx.ArMarkerControls(arToolkitContext, markerRoot, {
                type: 'pattern',
                patternUrl: 'https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.patt',
                changeMatrixMode: 'resize'
            });

            // --- ILUMINACIÓN (para que se vea el alfil) ---
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(2, 5, 3);
            dirLight.castShadow = true;
            scene.add(dirLight);
            const fillLight = new THREE.PointLight(0xccaa66, 0.5);
            fillLight.position.set(0, 2, 1);
            scene.add(fillLight);

            // --- CREAR EL ALFIL (mismo código que antes) ---
            const bishopGroup = new THREE.Group();
            const darkMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.7, roughness: 0.3 });
            const goldMat = new THREE.MeshStandardMaterial({ color: 0xccaa66, metalness: 0.85, roughness: 0.25 });

            // Base
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.95, 0.25, 32), darkMat);
            base.position.y = 0;
            base.castShadow = true;
            bishopGroup.add(base);
            // Cuerpo
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.8, 0.9, 32), darkMat);
            body.position.y = 0.7;
            bishopGroup.add(body);
            // Anillo
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.08, 32, 64), goldMat);
            ring.position.y = 0.75;
            ring.rotation.x = Math.PI/2;
            bishopGroup.add(ring);
            // Cuello
            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.55, 0.35, 24), darkMat);
            neck.position.y = 1.05;
            bishopGroup.add(neck);
            // Cabeza
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), darkMat);
            head.position.y = 1.35;
            head.scale.set(0.9, 0.65, 0.9);
            bishopGroup.add(head);
            // Mitra
            const mitreBase = new THREE.Mesh(new THREE.CylinderGeometry(0.48, 0.62, 0.45, 32), darkMat);
            mitreBase.position.y = 1.65;
            bishopGroup.add(mitreBase);
            // Punta
            const spike = new THREE.Mesh(new THREE.ConeGeometry(0.35, 0.7, 32), darkMat);
            spike.position.y = 1.95;
            bishopGroup.add(spike);
            // Bola dorada
            const finial = new THREE.Mesh(new THREE.SphereGeometry(0.14, 24, 24), goldMat);
            finial.position.y = 2.28;
            bishopGroup.add(finial);
            // Detalles
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const stud = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), goldMat);
                stud.position.set(Math.cos(angle) * 0.72, 0.55, Math.sin(angle) * 0.72);
                bishopGroup.add(stud);
            }

            markerRoot.add(bishopGroup);

            // --- CAMPO VECTORIAL (flechas) ---
            function vectorField(x, y, z) {
                let vx = -z;
                let vy = Math.sin(x) * Math.cos(z) * 0.8;
                let vz = x;
                let len = Math.sqrt(vx*vx + vy*vy + vz*vz);
                if (len < 0.01) return new THREE.Vector3(0, 0.2, 0);
                const scale = 0.45;
                return new THREE.Vector3(vx / len * scale, vy / len * scale, vz / len * scale);
            }

            const step = 1.2;
            for (let x = -2.5; x <= 2.5; x += step) {
                for (let z = -2.5; z <= 2.5; z += step) {
                    for (let y = 0.2; y <= 2.6; y += step) {
                        const distBody = Math.sqrt(x*x + (y-0.8)*(y-0.8) + z*z);
                        const distHead = Math.sqrt(x*x + (y-1.6)*(y-1.6) + z*z);
                        if (distBody > 0.85 && distHead > 0.7) {
                            const pos = new THREE.Vector3(x, y, z);
                            const dir = vectorField(x, y, z);
                            const color = new THREE.Color().setHSL(0.55 - Math.min(dir.length(), 1.0) * 0.4, 1, 0.6);
                            const arrow = new THREE.ArrowHelper(dir, pos, dir.length(), color, 0.25, 0.12);
                            markerRoot.add(arrow);
                        }
                    }
                }
            }

            // --- PARTÍCULAS (dinámicas) ---
            const particleCount = 600;
            const particleGeo = new THREE.BufferGeometry();
            const posArray = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                posArray[i*3] = (Math.random() - 0.5) * 5;
                posArray[i*3+1] = Math.random() * 3;
                posArray[i*3+2] = (Math.random() - 0.5) * 5;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const particleMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.06, transparent: true, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(particleGeo, particleMat);
            markerRoot.add(particles);

            function updateParticles() {
                const positionsAttr = particleGeo.attributes.position.array;
                for (let i = 0; i < particleCount; i++) {
                    let px = positionsAttr[i*3];
                    let py = positionsAttr[i*3+1];
                    let pz = positionsAttr[i*3+2];
                    const dir = vectorField(px, py, pz);
                    px += dir.x * 0.03;
                    py += dir.y * 0.03;
                    pz += dir.z * 0.03;
                    if (Math.abs(px) > 3.5 || pz > 3.5 || pz < -3.5 || py < 0 || py > 3.2) {
                        px = (Math.random() - 0.5) * 4.5;
                        pz = (Math.random() - 0.5) * 4.5;
                        py = Math.random() * 2.8;
                    }
                    positionsAttr[i*3] = px;
                    positionsAttr[i*3+1] = py;
                    positionsAttr[i*3+2] = pz;
                }
                particleGeo.attributes.position.needsUpdate = true;
                requestAnimationFrame(updateParticles);
            }
            updateParticles();

            // Manejar redimensionamiento
            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                if (arToolkitSource) arToolkitSource.onResize();
            });
        })();
    </script>
</body>
</html>
