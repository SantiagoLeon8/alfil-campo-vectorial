<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Figura Ojde - Visible con Campo Vectorial</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            font-size: 14px;
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>🔮 Figura "Ojde"</strong> | Basada en tus volúmenes | Campo vectorial interactivo
    </div>
    <div id="controls-note">
        🖱️ Ratón: rotar (izq), mover (der), zoom (rueda) | 📱 Táctil: gestos
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Tus volúmenes (positivos, extraídos de la imagen) ---
        // Nota: si hay más volúmenes positivos después de 0.5, agrégamelos y lo actualizo
        const volumenes = [10.60, 7.35, 6.22619, 5.34, 4.5, 3.5, 2.5, 1.5, 0.5];
        
        // Radio a partir de volumen de esfera: r = (3V/4π)^(1/3)
        const radios = volumenes.map(V => Math.pow((3 * V) / (4 * Math.PI), 1/3));
        const maxRadio = Math.max(...radios);  // ~1.36
        const escala = 1.5 / maxRadio;        // para que la más grande tenga radio 1.5
        const radiosEscalados = radios.map(r => r * escala);
        
        console.log('Radios escalados (unidades 3D):', radiosEscalados);
        
        // --- Escena ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.02);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 3, 5);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- Controles ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.2;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.target.set(0, 0, 0);
        
        // --- Iluminación potente para que la figura resalte ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x88aaff, 0.6);
        fillLight.position.set(-2, 1, 3);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xffaa66, 0.5);
        backLight.position.set(1, 2, -3);
        scene.add(backLight);
        
        const rimLight = new THREE.PointLight(0xff66aa, 0.7);
        rimLight.position.set(2, 1, 2);
        scene.add(rimLight);
        
        // Luz desde abajo para dar volumen
        const bottomLight = new THREE.PointLight(0x66ccff, 0.4);
        bottomLight.position.set(0, -1.5, 0);
        scene.add(bottomLight);
        
        // Suelo sutil
        const gridHelper = new THREE.GridHelper(8, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -1.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.3;
        scene.add(gridHelper);
        
        // --- FIGURA PRINCIPAL: Capas esféricas concéntricas BIEN VISIBLES ---
        const ojdeGroup = new THREE.Group();
        
        // Colores brillantes (de afuera hacia adentro)
        const colores = [0xff3366, 0xff7733, 0xffaa33, 0xffdd44, 0x88ff66, 0x44ccff, 0xaa66ff, 0xff66cc, 0xff88aa];
        
        radiosEscalados.forEach((radio, idx) => {
            if (radio < 0.05) return;
            const color = colores[idx % colores.length];
            // Material sólido con algo de metalizado y brillo
            const material = new THREE.MeshStandardMaterial({
                color: color,
                metalness: 0.4,
                roughness: 0.3,
                emissive: 0x221100,
                emissiveIntensity: 0.2,
                transparent: true,
                opacity: 0.85   // <--- bien visible
            });
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(radio, 64, 64), material);
            sphere.castShadow = true;
            sphere.receiveShadow = false;
            ojdeGroup.add(sphere);
            
            // Añadir un borde brillante (wireframe) para dar contorno
            const wireMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.25 });
            const wireSphere = new THREE.Mesh(new THREE.SphereGeometry(radio * 1.01, 32, 32), wireMat);
            ojdeGroup.add(wireSphere);
        });
        
        // Núcleo central brillante (para que se vea el centro)
        const coreMat = new THREE.MeshStandardMaterial({ color: 0xffaa55, emissive: 0xff4400, emissiveIntensity: 0.8, metalness: 0.9 });
        const coreSphere = new THREE.Mesh(new THREE.SphereGeometry(0.25, 32, 32), coreMat);
        ojdeGroup.add(coreSphere);
        
        scene.add(ojdeGroup);
        
        // --- Partículas internas flotantes (para dar sensación de volumen) ---
        const particleCount = 2500;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            // Distribución uniforme dentro de la esfera más grande
            const r = Math.pow(Math.random(), 1/3) * radiosEscalados[0];
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            particlePositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
            particlePositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            particlePositions[i*3+2] = r * Math.cos(phi);
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xffccaa, size: 0.025, transparent: true, blending: THREE.AdditiveBlending });
        const internalParticles = new THREE.Points(particleGeo, particleMat);
        ojdeGroup.add(internalParticles);
        
        // --- CAMPO VECTORIAL (flechas alrededor) ---
        function vectorField(x, y, z) {
            // Campo con rotación y ondas
            let vx = -z * 0.8;
            let vy = Math.sin(x * 1.5) * Math.cos(z * 1.2) * 0.6;
            let vz = x * 0.8;
            let len = Math.hypot(vx, vy, vz);
            if (len < 0.05) return new THREE.Vector3(0, 0.2, 0);
            const scale = 0.45;
            return new THREE.Vector3(vx / len * scale, vy / len * scale, vz / len * scale);
        }
        
        const step = 0.9;
        const arrowGroup = new THREE.Group();
        for (let x = -2.4; x <= 2.4; x += step) {
            for (let z = -2.4; z <= 2.4; z += step) {
                for (let y = -1.6; y <= 1.8; y += step) {
                    const dist = Math.hypot(x, y, z);
                    if (dist > 1.7 && dist < 3.2) {
                        const dir = vectorField(x, y, z);
                        const hue = 0.6 + (dir.x * 0.2);
                        const color = new THREE.Color().setHSL(hue, 1.0, 0.6);
                        const arrow = new THREE.ArrowHelper(dir, new THREE.Vector3(x, y, z), dir.length(), color, 0.28, 0.12);
                        arrowGroup.add(arrow);
                    }
                }
            }
        }
        scene.add(arrowGroup);
        
        // --- Partículas dinámicas que siguen el campo vectorial ---
        const flowCount = 1500;
        const flowGeo = new THREE.BufferGeometry();
        const flowPositions = new Float32Array(flowCount * 3);
        for (let i = 0; i < flowCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.2 + Math.random() * 1.2;
            const y = (Math.random() - 0.5) * 2.4;
            flowPositions[i*3] = Math.cos(angle) * radius;
            flowPositions[i*3+1] = y;
            flowPositions[i*3+2] = Math.sin(angle) * radius;
        }
        flowGeo.setAttribute('position', new THREE.BufferAttribute(flowPositions, 3));
        const flowMat = new THREE.PointsMaterial({ color: 0x88ddff, size: 0.045, transparent: true, blending: THREE.AdditiveBlending });
        const flowParticles = new THREE.Points(flowGeo, flowMat);
        scene.add(flowParticles);
        
        function updateFlow(deltaTime) {
            const positions = flowGeo.attributes.position.array;
            const speed = deltaTime * 2.5;
            for (let i = 0; i < flowCount; i++) {
                let px = positions[i*3];
                let py = positions[i*3+1];
                let pz = positions[i*3+2];
                const dir = vectorField(px, py, pz);
                px += dir.x * speed;
                py += dir.y * speed;
                pz += dir.z * speed;
                if (Math.hypot(px, py, pz) > 3.8 || Math.abs(py) > 2.5) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 2.2 + Math.random() * 1.2;
                    px = Math.cos(angle) * radius;
                    pz = Math.sin(angle) * radius;
                    py = (Math.random() - 0.5) * 2.2;
                }
                positions[i*3] = px;
                positions[i*3+1] = py;
                positions[i*3+2] = pz;
            }
            flowGeo.attributes.position.needsUpdate = true;
        }
        
        // --- Etiqueta informativa ---
        const labelDiv = document.createElement('div');
        labelDiv.textContent = `🌀 Ojde | ${radios.length} capas | Volumen total: ${volumenes[0]} cm³`;
        labelDiv.style.color = '#ffdd99';
        labelDiv.style.fontSize = '15px';
        labelDiv.style.fontWeight = 'bold';
        labelDiv.style.backgroundColor = 'rgba(0,0,0,0.6)';
        labelDiv.style.padding = '6px 14px';
        labelDiv.style.borderRadius = '30px';
        labelDiv.style.border = '1px solid #ffaa66';
        const labelObj = new CSS2DObject(labelDiv);
        labelObj.position.set(2.5, 2.2, 1.8);
        scene.add(labelObj);
        
        // --- Animación ---
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            // Efectos de luz
            rimLight.intensity = 0.7 + Math.sin(Date.now() * 0.003) * 0.2;
            bottomLight.intensity = 0.4 + Math.sin(Date.now() * 0.002) * 0.15;
            
            // Rotación suave de partículas internas
            internalParticles.rotation.y += 0.005;
            internalParticles.rotation.x += 0.003;
            
            updateFlow(delta);
            controls.update();
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Figura Ojde cargada correctamente. Radios:', radiosEscalados);
    </script>
</body>
</html>
