<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Figura de revolución (15 cm) con campo vectorial</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            font-size: 14px;
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>📐 FIGURA ORIGINAL (de la imagen)</strong> | Altura 15 cm | Base Ø4 cm | Punta 0 cm
    </div>
    <div id="controls-note">
        🖱️ Ratón: rotar (izq), mover (der), zoom (rueda) | La figura está dentro del campo vectorial
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- PERFIL DE LA FIGURA (según tu imagen: Z de 0 a 15 cm, radio variable) ---
        // Definimos puntos (radio, altura) para la revolución alrededor del eje Z.
        // Los valores están en centímetros, luego escalamos para que la altura total sea 15 unidades.
        const perfil = [
            { z: 0,  r: 2.0 },   // base
            { z: 1,  r: 1.95 },
            { z: 2,  r: 1.85 },
            { z: 3,  r: 1.70 },
            { z: 4,  r: 1.50 },
            { z: 5,  r: 1.30 },
            { z: 6,  r: 1.10 },
            { z: 7,  r: 0.90 },
            { z: 8,  r: 0.70 },
            { z: 9,  r: 0.55 },
            { z: 10, r: 0.40 },
            { z: 11, r: 0.28 },
            { z: 12, r: 0.18 },
            { z: 13, r: 0.10 },
            { z: 14, r: 0.04 },
            { z: 15, r: 0.00 }    // punta
        ];
        
        // Convertir a puntos Vector2 para LatheGeometry (Necesita (radio, y) con y desde -7.5 a 7.5 para centrar)
        // Desplazamos Z para que el centro de la figura esté en Y=0 (Three.js usa Y como eje vertical)
        const puntos = [];
        perfil.forEach(p => {
            // Convertir altura Z (0..15) a coordenada Y (-7.5 a 7.5)
            const y = p.z - 7.5;
            puntos.push(new THREE.Vector2(p.r, y));
        });
        
        // Crear geometría de revolución (48 segmentos alrededor)
        const geometry = new THREE.LatheGeometry(puntos, 64);
        
        // Material de la figura: metálico, color cobre, brillante
        const material = new THREE.MeshStandardMaterial({
            color: 0xcc8844,
            metalness: 0.85,
            roughness: 0.25,
            emissive: 0x331100,
            emissiveIntensity: 0.2
        });
        
        const figura = new THREE.Mesh(geometry, material);
        figura.castShadow = true;
        figura.receiveShadow = false;
        
        // --- Escena ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 5, 9);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // Controles
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.target.set(0, 0, 0);
        
        // --- Iluminación (potente para que la figura resalte) ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0xffaa66, 0.6);
        fillLight.position.set(-2, 2, 3);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0x44aaff, 0.5);
        backLight.position.set(0, 2, -4);
        scene.add(backLight);
        
        const rimLight = new THREE.PointLight(0xff66cc, 0.7);
        rimLight.position.set(2, 1, 2);
        scene.add(rimLight);
        
        const bottomLight = new THREE.PointLight(0x66ffaa, 0.4);
        bottomLight.position.set(0, -2, 0);
        scene.add(bottomLight);
        
        // Suelo (grilla decorativa)
        const gridHelper = new THREE.GridHelper(12, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -4.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.3;
        scene.add(gridHelper);
        
        // Añadir la figura a la escena
        scene.add(figura);
        
        // --- CAMPO VECTORIAL (flechas que rodean la figura) ---
        // Función de campo vectorial (flujo rotacional alrededor del eje Y con variación sinusoidal)
        function vectorField(x, y, z) {
            let vx = -z * 0.6;
            let vy = Math.sin(x * 1.2) * Math.cos(z * 1.2) * 0.5;
            let vz = x * 0.6;
            let len = Math.hypot(vx, vy, vz);
            if (len < 0.05) return new THREE.Vector3(0, 0.2, 0);
            const scale = 0.5;
            return new THREE.Vector3(vx / len * scale, vy / len * scale, vz / len * scale);
        }
        
        // Generar flechas en una caja que rodea la figura (pero sin penetrarla)
        const arrowGroup = new THREE.Group();
        const step = 1.0;
        // Rango de X y Z: de -3.5 a 3.5, Y de -5 a 5 (la figura ocupa Y de -7.5 a 7.5, pero evitamos el interior)
        for (let x = -3.8; x <= 3.8; x += step) {
            for (let z = -3.8; z <= 3.8; z += step) {
                for (let y = -5.5; y <= 5.5; y += step) {
                    // Distancia al centro (aproximadamente el radio de la figura en ese Y)
                    let radioFigura = 0;
                    // Calcular radio de la figura en esa altura Y (interpolación lineal)
                    for (let i = 0; i < perfil.length - 1; i++) {
                        const z1 = perfil[i].z - 7.5;
                        const z2 = perfil[i+1].z - 7.5;
                        if (y >= z1 && y <= z2) {
                            const t = (y - z1) / (z2 - z1);
                            radioFigura = perfil[i].r * (1 - t) + perfil[i+1].r * t;
                            break;
                        }
                    }
                    if (y < perfil[0].z - 7.5) radioFigura = perfil[0].r;
                    if (y > perfil[perfil.length-1].z - 7.5) radioFigura = perfil[perfil.length-1].r;
                    
                    const dist = Math.hypot(x, z);
                    // Solo poner flechas si estamos fuera de la figura (dist > radioFigura + 0.2) y dentro de un radio máximo
                    if (dist > radioFigura + 0.3 && dist < 4.2) {
                        const dir = vectorField(x, y, z);
                        const hue = 0.55 + (dir.x * 0.2);
                        const color = new THREE.Color().setHSL(hue, 1.0, 0.6);
                        const arrow = new THREE.ArrowHelper(dir, new THREE.Vector3(x, y, z), dir.length(), color, 0.28, 0.12);
                        arrowGroup.add(arrow);
                    }
                }
            }
        }
        scene.add(arrowGroup);
        
        // --- Partículas dinámicas que siguen el campo vectorial (flotando alrededor) ---
        const flowCount = 2000;
        const flowGeo = new THREE.BufferGeometry();
        const flowPositions = new Float32Array(flowCount * 3);
        for (let i = 0; i < flowCount; i++) {
            // Posiciones iniciales en un volumen alrededor
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.5 + Math.random() * 1.8;
            const y = -5 + Math.random() * 10;
            flowPositions[i*3] = Math.cos(angle) * radius;
            flowPositions[i*3+1] = y;
            flowPositions[i*3+2] = Math.sin(angle) * radius;
        }
        flowGeo.setAttribute('position', new THREE.BufferAttribute(flowPositions, 3));
        const flowMat = new THREE.PointsMaterial({ color: 0x88ddff, size: 0.055, transparent: true, blending: THREE.AdditiveBlending });
        const flowParticles = new THREE.Points(flowGeo, flowMat);
        scene.add(flowParticles);
        
        function updateFlow(deltaTime) {
            const positions = flowGeo.attributes.position.array;
            const speed = deltaTime * 2.5;
            for (let i = 0; i < flowCount; i++) {
                let px = positions[i*3];
                let py = positions[i*3+1];
                let pz = positions[i*3+2];
                const dir = vectorField(px, py, pz);
                px += dir.x * speed;
                py += dir.y * speed;
                pz += dir.z * speed;
                // Si se aleja demasiado o entra en la figura, reiniciar
                let radioFigura = 0;
                for (let j = 0; j < perfil.length - 1; j++) {
                    const z1 = perfil[j].z - 7.5;
                    const z2 = perfil[j+1].z - 7.5;
                    if (py >= z1 && py <= z2) {
                        const t = (py - z1) / (z2 - z1);
                        radioFigura = perfil[j].r * (1 - t) + perfil[j+1].r * t;
                        break;
                    }
                }
                if (py < perfil[0].z - 7.5) radioFigura = perfil[0].r;
                if (py > perfil[perfil.length-1].z - 7.5) radioFigura = perfil[perfil.length-1].r;
                
                if (Math.hypot(px, pz) < radioFigura + 0.2 || Math.hypot(px, py, pz) > 5.5) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 2.5 + Math.random() * 1.8;
                    px = Math.cos(angle) * radius;
                    pz = Math.sin(angle) * radius;
                    py = -5 + Math.random() * 10;
                }
                positions[i*3] = px;
                positions[i*3+1] = py;
                positions[i*3+2] = pz;
            }
            flowGeo.attributes.position.needsUpdate = true;
        }
        
        // --- Pequeñas partículas internas para dar volumen (opcional) ---
        const internalParticleCount = 1500;
        const internalGeo = new THREE.BufferGeometry();
        const internalPositions = new Float32Array(internalParticleCount * 3);
        for (let i = 0; i < internalParticleCount; i++) {
            // Generar puntos dentro del volumen de la figura
            const y = -7.5 + Math.random() * 15;
            let radioMax = 0;
            for (let j = 0; j < perfil.length - 1; j++) {
                const z1 = perfil[j].z - 7.5;
                const z2 = perfil[j+1].z - 7.5;
                if (y >= z1 && y <= z2) {
                    const t = (y - z1) / (z2 - z1);
                    radioMax = perfil[j].r * (1 - t) + perfil[j+1].r * t;
                    break;
                }
            }
            if (y < perfil[0].z - 7.5) radioMax = perfil[0].r;
            if (y > perfil[perfil.length-1].z - 7.5) radioMax = perfil[perfil.length-1].r;
            const r = Math.random() * radioMax;
            const angle = Math.random() * Math.PI * 2;
            const x = Math.cos(angle) * r;
            const z = Math.sin(angle) * r;
            internalPositions[i*3] = x;
            internalPositions[i*3+1] = y;
            internalPositions[i*3+2] = z;
        }
        internalGeo.setAttribute('position', new THREE.BufferAttribute(internalPositions, 3));
        const internalMat = new THREE.PointsMaterial({ color: 0xffaa88, size: 0.045, transparent: true, blending: THREE.AdditiveBlending });
        const internalParticles = new THREE.Points(internalGeo, internalMat);
        scene.add(internalParticles);
        
        // --- Etiqueta CSS ---
        const labelDiv = document.createElement('div');
        labelDiv.textContent = `📐 Figura original | Altura 15 cm | Base Ø4 cm | Campo vectorial a su alrededor`;
        labelDiv.style.color = '#ffdd99';
        labelDiv.style.backgroundColor = 'rgba(0,0,0,0.7)';
        labelDiv.style.padding = '6px 14px';
        labelDiv.style.borderRadius = '25px';
        labelDiv.style.fontSize = '14px';
        labelDiv.style.border = '1px solid #ff8844';
        const labelObj = new CSS2DObject(labelDiv);
        labelObj.position.set(3, 4.5, 3.5);
        scene.add(labelObj);
        
        // --- Animación ---
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            // Luces pulsantes
            rimLight.intensity = 0.7 + Math.sin(Date.now() * 0.003) * 0.2;
            bottomLight.intensity = 0.4 + Math.sin(Date.now() * 0.002) * 0.15;
            
            // Rotación suave de partículas internas
            internalParticles.rotation.y += 0.002;
            internalParticles.rotation.x += 0.001;
            
            updateFlow(delta);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Figura cargada con el perfil exacto de la imagen. Altura 15 cm, base 2 cm de radio.');
    </script>
</body>
</html>
