<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Figura compuesta (4 sólidos) + Campo vectorial</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            font-size: 14px;
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>🧩 FIGURA COMPUESTA</strong> | Cono truncado + Hiperboloide + Paraboloide + Esfera | Vol total 307 cm³
    </div>
    <div id="controls-note">
        🖱️ Ratón: rotar (izq), mover (der), zoom (rueda) | El campo vectorial rodea la figura
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ================== 1. CONSTRUCCIÓN DE LA FIGURA (4 partes) ==================
        // Escala: trabajamos en centímetros, altura total ~15 cm como antes
        // Definimos alturas para cada parte (basado en volúmenes relativos)
        // Cono truncado: altura 2.5 cm, radio base 2.2 cm, radio superior 1.8 cm (vol aprox 31 cm3)
        // Hiperboloide: altura 7 cm, radio central ~2.8 cm, radios extremos 1.8 cm (vol aprox 220)
        // Paraboloide: altura 4 cm, radio base 1.5 cm, radio punta 0 (vol aprox 35)
        // Esfera: radio 1.36 cm (vol 10.6), colocada en la punta
        
        const groupFig = new THREE.Group();
        
        // Material metálico común
        const mat = new THREE.MeshStandardMaterial({
            color: 0xcc8844,
            metalness: 0.85,
            roughness: 0.25,
            emissive: 0x331100,
            emissiveIntensity: 0.1
        });
        
        // 1. Cono truncado (base inferior)
        const cono = new THREE.Mesh(new THREE.CylinderGeometry(1.8, 2.2, 2.5, 48), mat);
        cono.position.y = -5.5;  // centrado para que la altura total vaya de -7.5 a +7.5
        cono.castShadow = true;
        groupFig.add(cono);
        
        // 2. Hiperboloide (lo simulamos con un cilindro con escala en Y y curvatura)
        // Para un hiperboloide visual, usaremos un cilindro con radio variable mediante vertex shader? Mejor usar un grupo de discos apilados
        // Alternativa: crear una geometría de lathe con perfil hiperbólico
        const hiperPuntos = [];
        for (let y = -4.0; y <= 3.0; y += 0.2) {
            // Ecuación de hiperboloide: radio = a * sqrt(1 + (y/b)^2) con a=1.3, b=3.5
            // Pero lo ajustamos para que en y=-4 radio~1.8, en y=0 radio~2.6, en y=3 radio~1.7
            let r = Math.sqrt(1.8 * 1.8 + (y * y) / 8);
            if (r < 1.6) r = 1.6;
            if (r > 2.7) r = 2.7;
            hiperPuntos.push(new THREE.Vector2(r, y));
        }
        const hiperGeo = new THREE.LatheGeometry(hiperPuntos, 48);
        const hiperboloide = new THREE.Mesh(hiperGeo, mat);
        hiperboloide.position.y = 0;
        hiperboloide.castShadow = true;
        groupFig.add(hiperboloide);
        
        // 3. Paraboloide (forma cónica superior)
        const paraPuntos = [];
        for (let y = 3.0; y <= 6.5; y += 0.15) {
            let r = 1.6 * (1 - (y - 3.0) / 3.8);
            if (r < 0) r = 0;
            paraPuntos.push(new THREE.Vector2(r, y));
        }
        const paraGeo = new THREE.LatheGeometry(paraPuntos, 48);
        const paraboloide = new THREE.Mesh(paraGeo, mat);
        paraboloide.position.y = 0;
        paraboloide.castShadow = true;
        groupFig.add(paraboloide);
        
        // 4. Esfera en la punta
        const esfera = new THREE.Mesh(new THREE.SphereGeometry(1.36, 48, 48), mat);
        esfera.position.y = 6.85;
        esfera.castShadow = true;
        groupFig.add(esfera);
        
        // Un pequeño anillo decorativo entre partes (opcional)
        const anillo = new THREE.Mesh(new THREE.TorusGeometry(1.85, 0.08, 32, 100), new THREE.MeshStandardMaterial({ color: 0xffaa66, metalness: 0.9 }));
        anillo.position.y = -4.0;
        anillo.rotation.x = Math.PI / 2;
        groupFig.add(anillo);
        
        const anillo2 = new THREE.Mesh(new THREE.TorusGeometry(2.15, 0.08, 32, 100), new THREE.MeshStandardMaterial({ color: 0xffaa66, metalness: 0.9 }));
        anillo2.position.y = -0.5;
        anillo2.rotation.x = Math.PI / 2;
        groupFig.add(anillo2);
        
        // Centrar el grupo para que su centro de masas quede en Y=0 (ahora está entre -5.5 y 7.2 -> offset)
        groupFig.position.y = -0.85;
        
        // Añadir wireframe para resaltar bordes (opcional)
        const wireframeFig = new THREE.Group();
        const wireMat = new THREE.MeshBasicMaterial({ color: 0xffaa66, wireframe: true, transparent: true, opacity: 0.25 });
        const conoWire = new THREE.Mesh(new THREE.CylinderGeometry(1.8, 2.2, 2.5, 32), wireMat);
        conoWire.position.y = -5.5;
        const hiperWire = new THREE.Mesh(hiperGeo, wireMat);
        hiperWire.position.y = 0;
        const paraWire = new THREE.Mesh(paraGeo, wireMat);
        paraWire.position.y = 0;
        const esferaWire = new THREE.Mesh(new THREE.SphereGeometry(1.36, 32, 32), wireMat);
        esferaWire.position.y = 6.85;
        wireframeFig.add(conoWire, hiperWire, paraWire, esferaWire);
        wireframeFig.position.y = -0.85;
        
        // ================== 2. ESCENA ==================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(7, 5, 10);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // Controles
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.target.set(0, 0, 0);
        
        // Iluminación
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0xffaa66, 0.6);
        fillLight.position.set(-2, 2, 3);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x44aaff, 0.5);
        backLight.position.set(0, 2, -4);
        scene.add(backLight);
        const rimLight = new THREE.PointLight(0xff66cc, 0.7);
        rimLight.position.set(2, 1, 2);
        scene.add(rimLight);
        const bottomLight = new THREE.PointLight(0x66ffaa, 0.4);
        bottomLight.position.set(0, -3, 0);
        scene.add(bottomLight);
        
        // Suelo decorativo
        const gridHelper = new THREE.GridHelper(14, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -4.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.3;
        scene.add(gridHelper);
        
        scene.add(groupFig);
        scene.add(wireframeFig);
        
        // ================== 3. CAMPO VECTORIAL ==================
        // Función para determinar el radio de la figura compuesta en cada altura Y
        function getCompositeRadius(y) {
            // y global (la figura está centrada, su rango aprox de -6.3 a 6.3)
            const yLocal = y + 0.85; // compensar el centrado
            if (yLocal < -5.5) return 0;
            if (yLocal < -3.0) {
                // cono truncado
                const t = (yLocal + 5.5) / 2.5; // 0 abajo, 1 arriba
                const r0 = 2.2;
                const r1 = 1.8;
                return r0 * (1 - t) + r1 * t;
            }
            if (yLocal < 2.5) {
                // hiperboloide: aproximación
                const t = (yLocal + 3.0) / 5.5;
                let r = 1.8 + t * 1.2;
                if (t > 0.5) r = 2.3 - (t - 0.5) * 0.8;
                if (r > 2.7) r = 2.7;
                if (r < 1.7) r = 1.7;
                return r;
            }
            if (yLocal < 6.3) {
                // paraboloide
                const t = (yLocal - 2.5) / 3.8;
                return 1.6 * (1 - t);
            }
            if (yLocal < 7.8) {
                // esfera
                const dy = yLocal - 6.85;
                const rSphere = 1.36;
                if (Math.abs(dy) > rSphere) return 0;
                return Math.sqrt(rSphere * rSphere - dy * dy);
            }
            return 0;
        }
        
        // Campo vectorial (torbellino)
        function vectorField(x, y, z) {
            let vx = -z * 0.55;
            let vy = Math.sin(x * 1.2) * Math.cos(z * 1.2) * 0.45;
            let vz = x * 0.55;
            let len = Math.hypot(vx, vy, vz);
            if (len < 0.05) return new THREE.Vector3(0, 0.2, 0);
            const scale = 0.5;
            return new THREE.Vector3(vx / len * scale, vy / len * scale, vz / len * scale);
        }
        
        const arrowGroup = new THREE.Group();
        const step = 0.9;
        for (let x = -3.8; x <= 3.8; x += step) {
            for (let z = -3.8; z <= 3.8; z += step) {
                for (let y = -5; y <= 6; y += step) {
                    const radFig = getCompositeRadius(y);
                    const distHor = Math.hypot(x, z);
                    if (distHor > radFig + 0.3 && distHor < 4.2) {
                        const dir = vectorField(x, y, z);
                        const hue = 0.55 + (dir.x * 0.2);
                        const color = new THREE.Color().setHSL(hue, 1.0, 0.6);
                        const arrow = new THREE.ArrowHelper(dir, new THREE.Vector3(x, y, z), dir.length(), color, 0.3, 0.13);
                        arrowGroup.add(arrow);
                    }
                }
            }
        }
        scene.add(arrowGroup);
        
        // Partículas dinámicas alrededor
        const flowCount = 2200;
        const flowGeo = new THREE.BufferGeometry();
        const flowPositions = new Float32Array(flowCount * 3);
        for (let i = 0; i < flowCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.5 + Math.random() * 1.6;
            const y = -4.5 + Math.random() * 11;
            flowPositions[i*3] = Math.cos(angle) * radius;
            flowPositions[i*3+1] = y;
            flowPositions[i*3+2] = Math.sin(angle) * radius;
        }
        flowGeo.setAttribute('position', new THREE.BufferAttribute(flowPositions, 3));
        const flowMat = new THREE.PointsMaterial({ color: 0x88ddff, size: 0.055, transparent: true, blending: THREE.AdditiveBlending });
        const flowParticles = new THREE.Points(flowGeo, flowMat);
        scene.add(flowParticles);
        
        function updateFlow(deltaTime) {
            const positions = flowGeo.attributes.position.array;
            const speed = deltaTime * 2.6;
            for (let i = 0; i < flowCount; i++) {
                let px = positions[i*3];
                let py = positions[i*3+1];
                let pz = positions[i*3+2];
                const dir = vectorField(px, py, pz);
                px += dir.x * speed;
                py += dir.y * speed;
                pz += dir.z * speed;
                const radFig = getCompositeRadius(py);
                const distHor = Math.hypot(px, pz);
                if (distHor < radFig + 0.15 || Math.abs(py) > 7 || distHor > 5.2) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 2.5 + Math.random() * 1.6;
                    px = Math.cos(angle) * radius;
                    pz = Math.sin(angle) * radius;
                    py = -4.5 + Math.random() * 11;
                }
                positions[i*3] = px;
                positions[i*3+1] = py;
                positions[i*3+2] = pz;
            }
            flowGeo.attributes.position.needsUpdate = true;
        }
        
        // Partículas internas (volumen)
        const intCount = 1800;
        const intGeo = new THREE.BufferGeometry();
        const intPos = new Float32Array(intCount * 3);
        for (let i = 0; i < intCount; i++) {
            const y = -5 + Math.random() * 12;
            const rMax = getCompositeRadius(y);
            const r = Math.random() * rMax;
            const angle = Math.random() * Math.PI * 2;
            const x = Math.cos(angle) * r;
            const z = Math.sin(angle) * r;
            intPos[i*3] = x;
            intPos[i*3+1] = y;
            intPos[i*3+2] = z;
        }
        intGeo.setAttribute('position', new THREE.BufferAttribute(intPos, 3));
        const intMat = new THREE.PointsMaterial({ color: 0xffaa88, size: 0.045, transparent: true, blending: THREE.AdditiveBlending });
        const internalParts = new THREE.Points(intGeo, intMat);
        scene.add(internalParts);
        
        // Etiqueta CSS
        const labelDiv = document.createElement('div');
        labelDiv.textContent = `🧩 Cono truncado + Hiperboloide + Paraboloide + Esfera | Volumen total ~307 cm³`;
        labelDiv.style.color = '#ffdd99';
        labelDiv.style.backgroundColor = 'rgba(0,0,0,0.7)';
        labelDiv.style.padding = '6px 14px';
        labelDiv.style.borderRadius = '25px';
        labelDiv.style.fontSize = '14px';
        labelDiv.style.border = '1px solid #ff8844';
        const labelObj = new CSS2DObject(labelDiv);
        labelObj.position.set(3, 5, 3.5);
        scene.add(labelObj);
        
        // Animación
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            rimLight.intensity = 0.7 + Math.sin(Date.now() * 0.003) * 0.2;
            bottomLight.intensity = 0.4 + Math.sin(Date.now() * 0.002) * 0.15;
            internalParts.rotation.y += 0.002;
            internalParts.rotation.x += 0.001;
            
            updateFlow(delta);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Figura compuesta (4 sólidos) cargada. Volumen total aproximado 307 cm³.');
    </script>
</body>
</html>
