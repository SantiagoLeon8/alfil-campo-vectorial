<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alfil con Campo Vectorial - Visualización 3D</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            font-size: 14px;
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            font-family: monospace;
        }
        @media (max-width: 600px) {
            #info { font-size: 10px; top: 10px; left: 10px; }
            #controls-note { font-size: 9px; }
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>♜ Alfil</strong> con campo vectorial | Arrastra para rotar | Click derecho para mover
    </div>
    <div id="controls-note">
        🖱️ Ratón: rotar (izq), mover (der), zoom (rueda) | 📱 Táctil: gestos estándar
    </div>

    <!-- Importamos Three.js y sus extensiones -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Inicialización de escena, cámara, renderers ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a); // azul noche profundo
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008); // niebla suave

        // Cámara perspectiva
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 6);
        camera.lookAt(0, 1.5, 0);

        // Renderer WebGL
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // activar sombras
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Renderer para texto 2D (etiqueta del campo vectorial)
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- Controles de órbita (interactividad) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;      // inercia
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 1.5, 0);

        // --- Iluminación ---
        // Luz ambiental
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        // Luz principal direccional (sombra)
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        mainLight.receiveShadow = false;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 8;
        mainLight.shadow.camera.left = -5;
        mainLight.shadow.camera.right = 5;
        mainLight.shadow.camera.top = 5;
        mainLight.shadow.camera.bottom = -5;
        scene.add(mainLight);
        
        // Luz de relleno desde atrás
        const backLight = new THREE.PointLight(0x4466cc, 0.4);
        backLight.position.set(-2, 2, -3);
        scene.add(backLight);
        
        // Luz cálida desde abajo para resaltar base
        const fillLight = new THREE.PointLight(0xccaa66, 0.3);
        fillLight.position.set(0, -1, 0);
        scene.add(fillLight);
        
        // Luz de acento lateral
        const rimLight = new THREE.PointLight(0xffaa66, 0.5);
        rimLight.position.set(1, 2, 2);
        scene.add(rimLight);
        
        // Pequeña luz que sigue la cámara (efecto "linterna")
        const cameraLight = new THREE.PointLight(0x88aaff, 0.2);
        cameraLight.position.set(0, 2, 3);
        scene.add(cameraLight);
        
        // --- Suelo y ayudas visuales (grilla y plano sutil) ---
        const gridHelper = new THREE.GridHelper(12, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.2;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.5;
        scene.add(gridHelper);
        
        // Plano reflector semi-transparente para recibir sombras suaves
        const shadowPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(7, 7),
            new THREE.ShadowMaterial({ opacity: 0.4, color: 0x000000, transparent: true, side: THREE.DoubleSide })
        );
        shadowPlane.rotation.x = -Math.PI / 2;
        shadowPlane.position.y = -0.19;
        shadowPlane.receiveShadow = true;
        scene.add(shadowPlane);
        
        // --- Creación del Alfil (pieza de ajedrez estilizada) ---
        const bishopGroup = new THREE.Group();
        
        // Materiales
        const darkMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.7, roughness: 0.3, emissive: 0x111111 });
        const goldMat = new THREE.MeshStandardMaterial({ color: 0xccaa66, metalness: 0.85, roughness: 0.25, emissive: 0x442200 });
        const accentMat = new THREE.MeshStandardMaterial({ color: 0xaa8866, metalness: 0.6, roughness: 0.4 });
        
        // Base (cilindro achatado)
        const base = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.95, 0.25, 32), darkMat);
        base.position.y = 0;
        base.castShadow = true;
        base.receiveShadow = false;
        bishopGroup.add(base);
        
        // Cuerpo principal (cilindro con ligera curva - usamos un cilindro estándar)
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.8, 0.9, 32), darkMat);
        body.position.y = 0.25 + 0.45;
        body.castShadow = true;
        bishopGroup.add(body);
        
        // Anillo decorativo (torus)
        const ring = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.08, 32, 64), goldMat);
        ring.position.y = 0.75;
        ring.rotation.x = Math.PI / 2;
        ring.castShadow = true;
        bishopGroup.add(ring);
        
        // Cuello
        const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.55, 0.35, 24), darkMat);
        neck.position.y = 1.05;
        neck.castShadow = true;
        bishopGroup.add(neck);
        
        // Cabeza (forma de cúpula)
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), darkMat);
        head.position.y = 1.35;
        head.scale.set(0.9, 0.65, 0.9);
        head.castShadow = true;
        bishopGroup.add(head);
        
        // Anillo superior (collar)
        const collar = new THREE.Mesh(new THREE.TorusGeometry(0.52, 0.07, 24, 48), goldMat);
        collar.position.y = 1.2;
        collar.rotation.x = Math.PI / 2;
        collar.castShadow = true;
        bishopGroup.add(collar);
        
        // Mitra (parte puntiaguda) - cono truncado
        const mitreBase = new THREE.Mesh(new THREE.CylinderGeometry(0.48, 0.62, 0.45, 32), darkMat);
        mitreBase.position.y = 1.65;
        mitreBase.castShadow = true;
        bishopGroup.add(mitreBase);
        
        const spike = new THREE.Mesh(new THREE.ConeGeometry(0.35, 0.7, 32), darkMat);
        spike.position.y = 1.95;
        spike.castShadow = true;
        bishopGroup.add(spike);
        
        // Bola superior (remate dorado)
        const finial = new THREE.Mesh(new THREE.SphereGeometry(0.14, 24, 24), goldMat);
        finial.position.y = 2.28;
        finial.castShadow = true;
        bishopGroup.add(finial);
        
        // Detalles de incrustaciones doradas (pequeñas esferas alrededor del cuerpo)
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const stud = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), goldMat);
            stud.position.set(Math.cos(angle) * 0.72, 0.55, Math.sin(angle) * 0.72);
            stud.castShadow = true;
            bishopGroup.add(stud);
        }
        
        scene.add(bishopGroup);
        
        // --- Campo Vectorial: conjunto de flechas (ArrowHelper) en un volumen alrededor del alfil ---
        // Definimos una función de campo vectorial F(x,y,z) = (-z, sin(x)*cos(z), x)
        // Esto produce un campo rotacional alrededor del eje Y con variación vertical.
        function vectorField(x, y, z) {
            // Evitamos vectores demasiado pequeños cerca del origen para que se vea bien
            let vx = -z;
            let vy = Math.sin(x) * Math.cos(z) * 0.8; // suave
            let vz = x;
            // Escalamos la longitud de la flecha para que sea uniformemente visible (normalizada y luego escalada a 0.4)
            let len = Math.sqrt(vx*vx + vy*vy + vz*vz);
            if (len < 0.01) return new THREE.Vector3(0, 0.2, 0); // fallback
            // Normalizar y luego multiplicar por un factor para tamaño visual consistente
            const scale = 0.45;
            return new THREE.Vector3(vx / len * scale, vy / len * scale, vz / len * scale);
        }
        
        // Configuración de la rejilla: X y Z de -2.5 a 2.5, Y de 0 a 2.5 (evitamos el interior del alfil)
        const step = 1.2;
        const positions = [];
        for (let x = -2.5; x <= 2.5 + 0.1; x += step) {
            for (let z = -2.5; z <= 2.5 + 0.1; z += step) {
                for (let y = 0.2; y <= 2.6; y += step) {
                    // Evitamos puntos demasiado cerca del alfil (radio de colisión aproximado)
                    // Distancia al centro del cuerpo (0, 0.8, 0) y a la cabeza (0, 1.6, 0)
                    const distToBody = Math.sqrt(x*x + (y-0.8)*(y-0.8) + z*z);
                    const distToHead = Math.sqrt(x*x + (y-1.6)*(y-1.6) + z*z);
                    if (distToBody > 0.85 && distToHead > 0.7) {
                        positions.push(new THREE.Vector3(x, y, z));
                    }
                }
            }
        }
        
        // Colores para las flechas según dirección (mapa de arcoíris basado en ángulo)
        const arrowGroup = new THREE.Group();
        const arrows = [];
        
        positions.forEach(pos => {
            const dir = vectorField(pos.x, pos.y, pos.z);
            // Longitud del vector original (antes de normalizar) para colorear según intensidad
            const origV = new THREE.Vector3(-pos.z, Math.sin(pos.x)*Math.cos(pos.z), pos.x);
            const intensity = Math.min(origV.length() / 1.5, 1.0);
            // Color: mezcla entre azul (baja intensidad) y rojo/naranja (alta intensidad)
            const color = new THREE.Color().setHSL(0.55 - intensity * 0.4, 1.0, 0.6);
            
            // Crear flecha en el punto 'pos' con dirección 'dir'
            // Usamos ArrowHelper que requiere origen, dirección, longitud, color, grosor de cabeza
            const arrow = new THREE.ArrowHelper(dir, pos, dir.length(), color, 0.25, 0.12);
            arrowGroup.add(arrow);
            arrows.push(arrow);
        });
        
        scene.add(arrowGroup);
        
        // Opcional: partículas brillantes que flotan siguiendo el campo (efecto visual)
        const particleCount = 800;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleVelocities = [];
        for (let i = 0; i < particleCount; i++) {
            // Posición inicial aleatoria en el volumen
            const x = (Math.random() - 0.5) * 6;
            const z = (Math.random() - 0.5) * 6;
            const y = Math.random() * 3;
            particlePositions[i*3] = x;
            particlePositions[i*3+1] = y;
            particlePositions[i*3+2] = z;
            particleVelocities.push(new THREE.Vector3(0, 0, 0));
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.05, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // Etiqueta CSS para el campo vectorial (solo estética)
        const labelDiv = document.createElement('div');
        labelDiv.textContent = '⚡ CAMPO VECTORIAL ⚡';
        labelDiv.style.color = '#aaddff';
        labelDiv.style.fontSize = '14px';
        labelDiv.style.fontWeight = 'bold';
        labelDiv.style.textShadow = '0 0 8px #0066ff';
        labelDiv.style.backgroundColor = 'rgba(0,0,0,0.5)';
        labelDiv.style.padding = '4px 12px';
        labelDiv.style.borderRadius = '20px';
        labelDiv.style.borderLeft = '3px solid #00aaff';
        const labelObject = new CSS2DObject(labelDiv);
        labelObject.position.set(2.5, 3.0, 2);
        scene.add(labelObject);
        
        // --- Animación de partículas (siguen el campo vectorial) ---
        function updateParticles(deltaTime) {
            const positionsAttr = particleGeometry.attributes.position.array;
            const speedFactor = deltaTime * 2.5; // velocidad suave
            
            for (let i = 0; i < particleCount; i++) {
                const ix = i*3;
                let px = positionsAttr[ix];
                let py = positionsAttr[ix+1];
                let pz = positionsAttr[ix+2];
                
                // Obtener dirección del campo en la posición actual de la partícula
                let fieldDir = vectorField(px, py, pz);
                // Mover partícula
                px += fieldDir.x * speedFactor;
                py += fieldDir.y * speedFactor;
                pz += fieldDir.z * speedFactor;
                
                // Rebote o recolocación si sale del volumen de interés
                if (Math.abs(px) > 3.5 || pz > 3.5 || pz < -3.5 || py < 0 || py > 3.2) {
                    // Reiniciar en borde aleatorio del volumen
                    px = (Math.random() - 0.5) * 5;
                    pz = (Math.random() - 0.5) * 5;
                    py = Math.random() * 2.8;
                    // Asegurar no estar dentro del alfil
                    const dBody = Math.sqrt(px*px + (py-0.8)*(py-0.8) + pz*pz);
                    if (dBody < 0.9) py += 0.8;
                }
                
                positionsAttr[ix] = px;
                positionsAttr[ix+1] = py;
                positionsAttr[ix+2] = pz;
            }
            particleGeometry.attributes.position.needsUpdate = true;
        }
        
        // --- Pequeña animación de rotación de las flechas NO, el campo es estático pero podemos hacer latido de intensidad? opcional: pulsar colores ligeramente ---
        let time = 0;
        
        // --- Bucle de animación ---
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            // Actualizar partículas
            updateParticles(delta);
            
            // Pequeño efecto de "respiración" en las luces
            const intensity = 0.4 + Math.sin(Date.now() * 0.002) * 0.1;
            rimLight.intensity = 0.5 + Math.sin(Date.now() * 0.0015) * 0.15;
            cameraLight.intensity = 0.2 + Math.sin(Date.now() * 0.0022) * 0.1;
            
            // Mover luz de cámara (sigue a la cámara)
            cameraLight.position.copy(camera.position);
            
            // Actualizar controles
            controls.update(); // solo si damping está activo o se necesita cada frame
            
            // Renderizar
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Ajustar tamaño de ventana
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Pequeño mensaje en consola
        console.log('Visualización lista: Alfil con campo vectorial');
    </script>
</body>
</html>
