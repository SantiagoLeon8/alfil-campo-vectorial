<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alfil AR con Campo Vectorial</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/1.6.2/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        .info {
            position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); color: white;
            padding: 8px 15px; border-radius: 8px; font-family: monospace; z-index: 100;
            pointer-events: none; font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="info">🎯 Apunta al marcador HIRO | Alfil + Campo Vectorial</div>

    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;'>
        <!-- Usar URL absoluta del patrón para mayor fiabilidad -->
        <a-marker type="pattern" url="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/data/hiro.patt">
            
            <!-- Grupo principal del Alfil -->
            <a-entity position="0 0 0" scale="0.45 0.45 0.45">
                <!-- Base -->
                <a-cylinder radius="0.9" height="0.25" color="#222" metalness="0.7" position="0 0 0"></a-cylinder>
                <!-- Cuerpo -->
                <a-cylinder radius="0.65" height="0.9" color="#222" metalness="0.7" position="0 0.6 0"></a-cylinder>
                <!-- Anillo dorado -->
                <a-torus radius="0.7" radius-tubular="0.08" color="#ccaa66" metalness="0.9" position="0 1.0 0" rotation="90 0 0"></a-torus>
                <!-- Cuello -->
                <a-cylinder radius="0.45" height="0.35" color="#222" position="0 1.3 0"></a-cylinder>
                <!-- Cabeza (esfera achatada) -->
                <a-sphere radius="0.5" color="#222" scale="0.9 0.65 0.9" position="0 1.65 0"></a-sphere>
                <!-- Mitra -->
                <a-cylinder radius="0.48" height="0.45" color="#222" position="0 1.95 0"></a-cylinder>
                <!-- Punta -->
                <a-cone radius="0.35" height="0.7" color="#222" position="0 2.25 0"></a-cone>
                <!-- Bola dorada -->
                <a-sphere radius="0.14" color="#ccaa66" position="0 2.6 0"></a-sphere>
            </a-entity>

            <!-- Flechas del Campo Vectorial -->
            <a-entity position="-1.2 1.0 -1.2">
                <a-arrow color="#00aaff" rotation="0 0 0"></a-arrow>
            </a-entity>
            <a-entity position="-1.2 1.0 0">
                <a-arrow color="#44ffaa" rotation="0 90 0"></a-arrow>
            </a-entity>
            <a-entity position="-1.2 1.0 1.2">
                <a-arrow color="#ffaa44" rotation="0 180 0"></a-arrow>
            </a-entity>
            <a-entity position="0 1.0 -1.2">
                <a-arrow color="#ff44aa" rotation="0 45 0"></a-arrow>
            </a-entity>
            <a-entity position="0 1.0 1.2">
                <a-arrow color="#aa44ff" rotation="0 -45 0"></a-arrow>
            </a-entity>
            <a-entity position="1.2 1.0 -1.2">
                <a-arrow color="#00ffaa" rotation="0 -90 0"></a-arrow>
            </a-entity>
            <a-entity position="1.2 1.0 0">
                <a-arrow color="#aa00ff" rotation="0 180 0"></a-arrow>
            </a-entity>
            <a-entity position="1.2 1.0 1.2">
                <a-arrow color="#ff6600" rotation="0 90 0"></a-arrow>
            </a-entity>
            <a-entity position="-1 1.8 -1">
                <a-arrow color="#88aaff" rotation="20 45 0"></a-arrow>
            </a-entity>
            <a-entity position="1 2.2 1">
                <a-arrow color="#88aaff" rotation="-20 -30 0"></a-arrow>
            </a-entity>
            <a-entity position="0 2.5 0">
                <a-arrow color="#ff8888" rotation="45 0 0"></a-arrow>
            </a-entity>

        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Registrar el componente 'a-arrow' para crear las flechas
        AFRAME.registerComponent('a-arrow', {
            schema: { color: { type: 'color', default: '#ff0000' } },
            init: function() {
                const color = this.data.color;
                const group = document.createElement('a-entity');
                const shaft = document.createElement('a-cylinder');
                shaft.setAttribute('radius', '0.08');
                shaft.setAttribute('height', '0.8');
                shaft.setAttribute('color', color);
                shaft.setAttribute('position', '0 0.4 0');
                const head = document.createElement('a-cone');
                head.setAttribute('radius', '0.2');
                head.setAttribute('height', '0.3');
                head.setAttribute('color', color);
                head.setAttribute('position', '0 0.85 0');
                group.appendChild(shaft);
                group.appendChild(head);
                this.el.appendChild(group);
                group.object3D.rotation.x = Math.PI / 2;
            }
        });
    </script>
</body>
</html>
