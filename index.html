<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Figura Ojde con Campo Vectorial</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            font-size: 14px;
        }

        #controls-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            #info {
                font-size: 10px;
                top: 10px;
                left: 10px;
            }

            #controls-note {
                font-size: 9px;
            }
        }
    </style>
</head>

<body>
    <div id="info">
        <strong>🌀 Figura "Ojde"</strong> | Basada en tus volúmenes | Campo vectorial alrededor
    </div>
    <div id="controls-note">
        🖱️ Ratón: rotar (izq), mover (der), zoom (rueda) | 📱 Táctil: gestos estándar
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Datos de volúmenes extraídos de tu imagen ---
        // Lista completa desde "Esfera: 10.60 cm³" hasta -148 cm³, tomamos solo los positivos hasta 0.5
        const volumenesStr = [
            "10.60", "7.35", "6.22619", "5.34", "4.5", "3.5", "2.5", "1.5", "0.5"
        ];
        // Convertir a números
        const volumenes = volumenesStr.map(v => parseFloat(v));
        // Función para calcular radio (cm) a partir de volumen (cm³) de una esfera: V = 4/3 * PI * r^3 => r = (3V/(4PI))^(1/3)
        function radioDesdeVolumen(V) {
            return Math.pow((3 * V) / (4 * Math.PI), 1 / 3);
        }
        // Radios de cada capa
        const radios = volumenes.map(v => radioDesdeVolumen(v));
        // El radio máximo para escala visual (normalizamos para que la más grande tenga tamaño ~1.5 unidades)
        const maxRadio = Math.max(...radios);
        const escala = 1.5 / maxRadio;
        const radiosEscalados = radios.map(r => r * escala);

        console.log("Radios escalados:", radiosEscalados);

        // --- Configuración de escena ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.03);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2, 4);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // CSS2 para etiquetas
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- Controles ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);

        // --- Iluminación ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const backLight = new THREE.PointLight(0x4466cc, 0.5);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xccaa66, 0.4);
        fillLight.position.set(0, -1, 0);
        scene.add(fillLight);
        const rimLight = new THREE.PointLight(0xffaa66, 0.6);
        rimLight.position.set(1, 1.5, 2);
        scene.add(rimLight);

        // Suelo sutil
        const gridHelper = new THREE.GridHelper(8, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -1.2;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.3;
        scene.add(gridHelper);

        // --- Creación de la figura "Ojde": capas esféricas concéntricas ---
        const groupOjde = new THREE.Group();

        // Colores para las capas (desde exterior a interior)
        const colores = [
            0xff3366, 0xff6633, 0xff9933, 0xffcc33, 0xffdd77,
            0x88aaff, 0x66ccff, 0x33aaff, 0x2288dd
        ];

        // Material semitransparente con wireframe opcional para efecto visual
        radiosEscalados.forEach((radio, idx) => {
            // Solo mostramos si radio > 0.05
            if (radio < 0.05) return;
            const color = colores[idx % colores.length];
            const material = new THREE.MeshPhongMaterial({
                color: color,
                emissive: 0x221100,
                transparent: true,
                opacity: 0.35,
                side: THREE.DoubleSide
            });
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(radio, 64, 64), material);
            sphere.castShadow = true;
            sphere.receiveShadow = false;
            groupOjde.add(sphere);

            // Añadir un borde de alambre para cada capa (estilo esfera de malla)
            const wireframeMat = new THREE.MeshBasicMaterial({ color: color, wireframe: true, transparent: true, opacity: 0.2 });
            const wireframeSphere = new THREE.Mesh(new THREE.SphereGeometry(radio, 24, 24), wireframeMat);
            groupOjde.add(wireframeSphere);
        });

        // Añadir partículas internas para dar sensación de volumen
        const particleCount = 2000;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            // Distribuir dentro de la esfera más grande
            const r = Math.random() ** (1 / 3) * radiosEscalados[0]; // distribución uniforme en volumen
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);
            particlePositions[i * 3] = x;
            particlePositions[i * 3 + 1] = y;
            particlePositions[i * 3 + 2] = z;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xffaa88, size: 0.02, transparent: true, blending: THREE.AdditiveBlending });
        const internalParticles = new THREE.Points(particleGeo, particleMat);
        groupOjde.add(internalParticles);

        scene.add(groupOjde);

        // --- Campo vectorial (flechas) alrededor de la figura ---
        // Definimos un campo vectorial con rotación y divergencia suave
        function vectorField(x, y, z) {
            // Campo tipo torbellino: F = (-z, sin(x)*cos(z), x)
            let vx = -z;
            let vy = Math.sin(x) * Math.cos(z) * 0.8;
            let vz = x;
            let len = Math.hypot(vx, vy, vz);
            if (len < 0.01) return new THREE.Vector3(0, 0.2, 0);
            const scale = 0.4;
            return new THREE.Vector3(vx / len * scale, vy / len * scale, vz / len * scale);
        }

        // Rejilla de flechas en un volumen que rodea la figura (radio externo ~2.2)
        const step = 0.9;
        const arrowGroup = new THREE.Group();
        for (let x = -2.2; x <= 2.2; x += step) {
            for (let z = -2.2; z <= 2.2; z += step) {
                for (let y = -1.5; y <= 1.8; y += step) {
                    // Evitar puntos dentro de la esfera más grande (radio ~1.5)
                    const dist = Math.hypot(x, y, z);
                    if (dist > 1.6 && dist < 3.0) {
                        const dir = vectorField(x, y, z);
                        const color = new THREE.Color().setHSL(0.55 + (dir.x * 0.2), 1.0, 0.6);
                        const arrow = new THREE.ArrowHelper(dir, new THREE.Vector3(x, y, z), dir.length(), color, 0.25, 0.1);
                        arrowGroup.add(arrow);
                    }
                }
            }
        }
        scene.add(arrowGroup);

        // --- Partículas dinámicas que siguen el campo vectorial (flotando alrededor) ---
        const flowParticleCount = 1200;
        const flowGeo = new THREE.BufferGeometry();
        const flowPositions = new Float32Array(flowParticleCount * 3);
        const flowVelocities = [];
        for (let i = 0; i < flowParticleCount; i++) {
            // Posiciones iniciales en un anillo alrededor
            const angle = Math.random() * Math.PI * 2;
            const radius = 2.0 + Math.random() * 1.2;
            const y = (Math.random() - 0.5) * 2.5;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            flowPositions[i * 3] = x;
            flowPositions[i * 3 + 1] = y;
            flowPositions[i * 3 + 2] = z;
            flowVelocities.push(new THREE.Vector3(0, 0, 0));
        }
        flowGeo.setAttribute('position', new THREE.BufferAttribute(flowPositions, 3));
        const flowMat = new THREE.PointsMaterial({ color: 0x88ddff, size: 0.04, transparent: true, blending: THREE.AdditiveBlending });
        const flowParticles = new THREE.Points(flowGeo, flowMat);
        scene.add(flowParticles);

        function updateFlowParticles(deltaTime) {
            const positionsAttr = flowGeo.attributes.position.array;
            const speed = deltaTime * 2.2;
            for (let i = 0; i < flowParticleCount; i++) {
                const ix = i * 3;
                let px = positionsAttr[ix];
                let py = positionsAttr[ix + 1];
                let pz = positionsAttr[ix + 2];
                const field = vectorField(px, py, pz);
                px += field.x * speed;
                py += field.y * speed;
                pz += field.z * speed;
                // Reiniciar si se aleja demasiado
                const distFromCenter = Math.hypot(px, py, pz);
                if (distFromCenter > 3.5 || Math.abs(py) > 2.2) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 2.0 + Math.random() * 1.2;
                    px = Math.cos(angle) * radius;
                    pz = Math.sin(angle) * radius;
                    py = (Math.random() - 0.5) * 2.2;
                }
                positionsAttr[ix] = px;
                positionsAttr[ix + 1] = py;
                positionsAttr[ix + 2] = pz;
            }
            flowGeo.attributes.position.needsUpdate = true;
        }

        // --- Etiqueta CSS ---
        const labelDiv = document.createElement('div');
        labelDiv.textContent = `🌀 Ojde | ${radios.length} capas | Vol max: ${volumenes[0]} cm³`;
        labelDiv.style.color = '#ffccaa';
        labelDiv.style.fontSize = '14px';
        labelDiv.style.fontWeight = 'bold';
        labelDiv.style.backgroundColor = 'rgba(0,0,0,0.6)';
        labelDiv.style.padding = '4px 12px';
        labelDiv.style.borderRadius = '20px';
        labelDiv.style.borderLeft = '3px solid #ff6633';
        const labelObj = new CSS2DObject(labelDiv);
        labelObj.position.set(2.2, 1.8, 1.5);
        scene.add(labelObj);

        // --- Animación de luces y partículas ---
        let time = 0;
        let lastTime = performance.now();

        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;

            time += delta;
            // Efecto de luz pulsante
            rimLight.intensity = 0.6 + Math.sin(time * 3) * 0.2;

            // Rotación muy leve de las partículas internas (opcional)
            internalParticles.rotation.y = time * 0.1;
            internalParticles.rotation.x = Math.sin(time * 0.2) * 0.2;

            // Actualizar partículas de flujo
            updateFlowParticles(delta);

            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', onWindowResize);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        console.log("Figura Ojde cargada con", radiosEscalados.length, "capas");
    </script>
</body>

</html>
