<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alfil con Campo Vectorial en Realidad Aumentada</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 8px;
            z-index: 100;
            pointer-events: none;
            font-size: 14px;
            backdrop-filter: blur(4px);
        }
        @media (max-width: 600px) {
            .info { font-size: 10px; bottom: 10px; left: 10px; }
        }
    </style>
</head>
<body>
    <div class="info">
        🧩 Apunta al marcador Hiro | Mueve la cámara para ver el alfil y las flechas
    </div>

    <!-- Importamos AR.js y Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "ar.js": "https://unpkg.com/ar.js@2.2.2/three.js/ar-threex.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARjs } from 'ar.js';

        // Inicializar AR.js con la cámara y el marcador HIRO
        const arjs = new ARjs({
            sourceType: 'webcam',
            sourceWidth: 640,
            sourceHeight: 480,
            displayWidth: window.innerWidth,
            displayHeight: window.innerHeight,
            debugUIEnabled: false,
            trackingMethod: 'ARToolKit' // usa el clásico marcador
        });

        // Esperar a que ar.js cargue y obtener la escena Three.js integrada
        arjs.init().then(() => {
            // La escena y la cámara son manejadas por ar.js, pero podemos acceder a ellas
            const scene = arjs.scene;
            const camera = arjs.camera;
            const renderer = arjs.renderer;
            
            // --- ILUMINACIÓN ---
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
            mainLight.position.set(2, 5, 3);
            scene.add(mainLight);
            
            const fillLight = new THREE.PointLight(0xccaa66, 0.4);
            fillLight.position.set(0, 2, 1);
            scene.add(fillLight);
            
            const backLight = new THREE.PointLight(0x4466cc, 0.3);
            backLight.position.set(-1, 2, -2);
            scene.add(backLight);
            
            // --- GRUPO DEL ALFIL (todo lo que aparecerá sobre el marcador) ---
            const arGroup = new THREE.Group(); // este grupo se posiciona en el marcador automáticamente
            arjs.addMarker('hiro', arGroup);   // vincula el grupo al patrón HIRO
            
            // Crear el alfil (mismo código que antes)
            const bishopGroup = new THREE.Group();
            
            const darkMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.7, roughness: 0.3 });
            const goldMat = new THREE.MeshStandardMaterial({ color: 0xccaa66, metalness: 0.85, roughness: 0.25 });
            
            // Base
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.95, 0.25, 32), darkMat);
            base.position.y = 0;
            base.castShadow = true;
            bishopGroup.add(base);
            
            // Cuerpo
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.8, 0.9, 32), darkMat);
            body.position.y = 0.7;
            bishopGroup.add(body);
            
            // Anillo
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.08, 32, 64), goldMat);
            ring.position.y = 0.75;
            ring.rotation.x = Math.PI/2;
            bishopGroup.add(ring);
            
            // Cuello
            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.55, 0.35, 24), darkMat);
            neck.position.y = 1.05;
            bishopGroup.add(neck);
            
            // Cabeza
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), darkMat);
            head.position.y = 1.35;
            head.scale.set(0.9, 0.65, 0.9);
            bishopGroup.add(head);
            
            // Mitra y remate
            const mitreBase = new THREE.Mesh(new THREE.CylinderGeometry(0.48, 0.62, 0.45, 32), darkMat);
            mitreBase.position.y = 1.65;
            bishopGroup.add(mitreBase);
            
            const spike = new THREE.Mesh(new THREE.ConeGeometry(0.35, 0.7, 32), darkMat);
            spike.position.y = 1.95;
            bishopGroup.add(spike);
            
            const finial = new THREE.Mesh(new THREE.SphereGeometry(0.14, 24, 24), goldMat);
            finial.position.y = 2.28;
            bishopGroup.add(finial);
            
            // Incrustaciones doradas
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const stud = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), goldMat);
                stud.position.set(Math.cos(angle) * 0.72, 0.55, Math.sin(angle) * 0.72);
                bishopGroup.add(stud);
            }
            
            arGroup.add(bishopGroup);
            
            // --- CAMPO VECTORIAL (flechas) ---
            function vectorField(x, y, z) {
                let vx = -z;
                let vy = Math.sin(x) * Math.cos(z) * 0.8;
                let vz = x;
                let len = Math.sqrt(vx*vx + vy*vy + vz*vz);
                if (len < 0.01) return new THREE.Vector3(0, 0.2, 0);
                const scale = 0.45;
                return new THREE.Vector3(vx / len * scale, vy / len * scale, vz / len * scale);
            }
            
            const step = 1.2;
            const positions = [];
            for (let x = -2.5; x <= 2.5; x += step) {
                for (let z = -2.5; z <= 2.5; z += step) {
                    for (let y = 0.2; y <= 2.6; y += step) {
                        const distBody = Math.sqrt(x*x + (y-0.8)*(y-0.8) + z*z);
                        const distHead = Math.sqrt(x*x + (y-1.6)*(y-1.6) + z*z);
                        if (distBody > 0.85 && distHead > 0.7) {
                            positions.push(new THREE.Vector3(x, y, z));
                        }
                    }
                }
            }
            
            positions.forEach(pos => {
                const dir = vectorField(pos.x, pos.y, pos.z);
                const color = new THREE.Color().setHSL(0.55 - Math.min(dir.length(), 1.0) * 0.4, 1, 0.6);
                const arrow = new THREE.ArrowHelper(dir, pos, dir.length(), color, 0.25, 0.12);
                arGroup.add(arrow);
            });
            
            // --- PARTÍCULAS FLOTANTES (siguen el campo) ---
            const particleCount = 600;
            const particleGeo = new THREE.BufferGeometry();
            const positionsArray = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                positionsArray[i*3] = (Math.random() - 0.5) * 5;
                positionsArray[i*3+1] = Math.random() * 3;
                positionsArray[i*3+2] = (Math.random() - 0.5) * 5;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(positionsArray, 3));
            const particleMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.06, transparent: true, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(particleGeo, particleMat);
            arGroup.add(particles);
            
            // Animación de partículas (actualización en cada frame)
            function updateParticles() {
                const positionsAttr = particleGeo.attributes.position.array;
                for (let i = 0; i < particleCount; i++) {
                    let px = positionsAttr[i*3];
                    let py = positionsAttr[i*3+1];
                    let pz = positionsAttr[i*3+2];
                    const dir = vectorField(px, py, pz);
                    px += dir.x * 0.03;
                    py += dir.y * 0.03;
                    pz += dir.z * 0.03;
                    if (Math.abs(px) > 3.5 || pz > 3.5 || pz < -3.5 || py < 0 || py > 3.2) {
                        px = (Math.random() - 0.5) * 4.5;
                        pz = (Math.random() - 0.5) * 4.5;
                        py = Math.random() * 2.8;
                    }
                    positionsAttr[i*3] = px;
                    positionsAttr[i*3+1] = py;
                    positionsAttr[i*3+2] = pz;
                }
                particleGeo.attributes.position.needsUpdate = true;
                requestAnimationFrame(updateParticles);
            }
            updateParticles();
            
            // Sombra en el suelo virtual (opcional)
            const shadowPlane = new THREE.Mesh(
                new THREE.PlaneGeometry(3, 3),
                new THREE.ShadowMaterial({ opacity: 0.5, color: 0x000000, transparent: true })
            );
            shadowPlane.rotation.x = -Math.PI / 2;
            shadowPlane.position.y = -0.2;
            shadowPlane.receiveShadow = true;
            arGroup.add(shadowPlane);
            
            // Pequeña luz que sigue al marcador (para dar calidez)
            const markerLight = new THREE.PointLight(0xffaa66, 0.5);
            markerLight.position.set(0, 1.5, 0);
            arGroup.add(markerLight);
            
            // Iniciar el loop de renderizado de AR.js
            arjs.start();
        }).catch(error => {
            console.error('Error iniciando AR.js:', error);
            document.body.innerHTML = '<div style="color:red; padding:20px;">Error al acceder a la cámara. Asegúrate de usar HTTPS y dar permisos.</div>';
        });
    </script>
</body>
</html>
